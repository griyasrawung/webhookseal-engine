name: ci
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: make generate
      - run: go test ./... -v -race -coverprofile=coverage.txt

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: make generate
      - run: go build ./...

  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go vet ./...

  fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go test ./pkg/webhookseal -run TestProviderFixtures -v

  embed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go list -f '{{.EmbedFiles}}' ./internal/specs
